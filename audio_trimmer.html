<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MP3音频剪辑器</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0b;
            --bg-card: #141416;
            --bg-elevated: #1c1c1f;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.3);
            --text-primary: #f5f5f7;
            --text-secondary: #8a8a8e;
            --border: #2a2a2e;
            --success: #34c759;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            background-image: 
                radial-gradient(ellipse at 20% 0%, rgba(255, 107, 53, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(255, 107, 53, 0.05) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .upload-zone {
            background: var(--bg-card);
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 24px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: var(--bg-elevated);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 20px;
            opacity: 0.6;
        }

        .upload-text {
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        input[type="file"] {
            display: none;
        }

        .editor-panel {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            display: none;
        }

        .editor-panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent) 0%, #ff8f66 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-details {
            flex: 1;
        }

        .file-name {
            font-weight: 500;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .file-meta {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .waveform-container {
            position: relative;
            height: 140px;
            background: var(--bg-dark);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #waveform {
            width: 100%;
            height: 100%;
        }

        .selection-overlay {
            position: absolute;
            top: 0;
            height: 100%;
            background: rgba(255, 107, 53, 0.25);
            border-left: 2px solid var(--accent);
            border-right: 2px solid var(--accent);
            pointer-events: none;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .time-item {
            background: var(--bg-elevated);
            padding: 12px 20px;
            border-radius: 8px;
            min-width: 140px;
            text-align: center;
        }

        .time-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 4px;
        }

        .time-value {
            color: var(--accent);
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 0.95rem;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, #ff8f66 100%);
            color: white;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--text-secondary);
            background: var(--bg-card);
        }

        .btn-icon {
            width: 20px;
            height: 20px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent) 0%, var(--success) 100%);
            border-radius: 3px;
            transition: width 0.2s ease;
            width: 0%;
        }

        .slider-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .slider-group {
            flex: 1;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: var(--bg-dark);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .duration-info {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
        }

        .tips {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
        }

        .tips-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .tips-list {
            list-style: none;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .tips-list li::before {
            content: "→";
            color: var(--accent);
            margin-right: 8px;
        }

        @media (max-width: 600px) {
            .slider-container {
                flex-direction: column;
            }
            
            .time-display {
                flex-direction: column;
                gap: 10px;
            }
            
            .time-item {
                width: 100%;
            }
            
            .controls {
                flex-direction: column;
            }
            
            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>MP3 Audio Trimmer</h1>
            <p class="subtitle">在线剪辑您的音频文件</p>
        </header>

        <div class="upload-zone" id="uploadZone">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25m18 0A2.25 2.25 0 0018.75 3H5.25A2.25 2.25 0 003 5.25m18 0V12a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 12V5.25"/>
            </svg>
            <p class="upload-text">点击或拖拽上传 MP3 文件</p>
            <p class="upload-hint">支持 .mp3 格式，最大 50MB</p>
            <input type="file" id="fileInput" accept="audio/mp3,audio/mpeg">
        </div>

        <div class="editor-panel" id="editorPanel">
            <div class="file-info">
                <div class="file-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                </div>
                <div class="file-details">
                    <div class="file-name" id="fileName">audio.mp3</div>
                    <div class="file-meta" id="fileMeta">00:00 / 00:00</div>
                </div>
            </div>

            <div class="waveform-container">
                <canvas id="waveform"></canvas>
                <div class="selection-overlay" id="selectionOverlay"></div>
            </div>

            <div class="time-display">
                <div class="time-item">
                    <div class="time-label">起始时间</div>
                    <div class="time-value" id="startTime">00:00</div>
                </div>
                <div class="time-item">
                    <div class="time-label">结束时间</div>
                    <div class="time-value" id="endTime">00:00</div>
                </div>
                <div class="time-item">
                    <div class="time-label">剪辑时长</div>
                    <div class="time-value" id="duration">00:00</div>
                </div>
            </div>

            <div class="slider-container">
                <div class="slider-group">
                    <div class="slider-label">
                        <span>起始点</span>
                        <span id="startSliderVal">0%</span>
                    </div>
                    <input type="range" id="startSlider" min="0" max="100" value="0">
                </div>
                <div class="slider-group">
                    <div class="slider-label">
                        <span>结束点</span>
                        <span id="endSliderVal">100%</span>
                    </div>
                    <input type="range" id="endSlider" min="0" max="100" value="100">
                </div>
            </div>

            <div class="controls">
                <button class="btn-secondary" id="playBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    预览
                </button>
                <button class="btn-secondary" id="stopBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="6" width="12" height="12"/>
                    </svg>
                    停止
                </button>
                <button class="btn-primary" id="exportBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                    </svg>
                    导出剪辑
                </button>
            </div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div class="tips">
            <div class="tips-title">使用说明</div>
            <ul class="tips-list">
                <li>拖拽滑块或直接在波形图上选择需要保留的音频片段</li>
                <li>点击"预览"按钮播放选中的片段</li>
                <li>点击"导出剪辑"按钮下载处理后的音频文件</li>
                <li>所有处理在浏览器本地完成，不会上传至服务器</li>
            </ul>
        </div>
    </div>

    <script>
        class AudioTrimmer {
            constructor() {
                this.audioContext = null;
                this.audioBuffer = null;
                this.sourceNode = null;
                this.isPlaying = false;
                this.startTime = 0;
                this.endTime = 0;
                this.duration = 0;
                this.playStartOffset = 0;
                
                this.initElements();
                this.initEvents();
            }

            initElements() {
                this.uploadZone = document.getElementById('uploadZone');
                this.fileInput = document.getElementById('fileInput');
                this.editorPanel = document.getElementById('editorPanel');
                this.fileName = document.getElementById('fileName');
                this.fileMeta = document.getElementById('fileMeta');
                this.waveformCanvas = document.getElementById('waveform');
                this.selectionOverlay = document.getElementById('selectionOverlay');
                this.startTimeEl = document.getElementById('startTime');
                this.endTimeEl = document.getElementById('endTime');
                this.durationEl = document.getElementById('duration');
                this.startSlider = document.getElementById('startSlider');
                this.endSlider = document.getElementById('endSlider');
                this.startSliderVal = document.getElementById('startSliderVal');
                this.endSliderVal = document.getElementById('endSliderVal');
                this.playBtn = document.getElementById('playBtn');
                this.stopBtn = document.getElementById('stopBtn');
                this.exportBtn = document.getElementById('exportBtn');
                this.progressBar = document.getElementById('progressBar');
                this.progressFill = document.getElementById('progressFill');
            }

            initEvents() {
                this.uploadZone.addEventListener('click', () => this.fileInput.click());
                this.uploadZone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    this.uploadZone.classList.add('dragover');
                });
                this.uploadZone.addEventListener('dragleave', () => {
                    this.uploadZone.classList.remove('dragover');
                });
                this.uploadZone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    this.uploadZone.classList.remove('dragover');
                    const file = e.dataTransfer.files[0];
                    if (file) this.loadFile(file);
                });
                this.fileInput.addEventListener('change', (e) => {
                    if (e.target.files[0]) this.loadFile(e.target.files[0]);
                });

                this.startSlider.addEventListener('input', () => this.updateSelection());
                this.endSlider.addEventListener('input', () => this.updateSelection());
                this.playBtn.addEventListener('click', () => this.play());
                this.stopBtn.addEventListener('click', () => this.stop());
                this.exportBtn.addEventListener('click', () => this.export());
            }

            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            async loadFile(file) {
                if (!file.type.match('audio.*') && !file.name.endsWith('.mp3')) {
                    alert('请上传 MP3 文件');
                    return;
                }

                if (file.size > 50 * 1024 * 1024) {
                    alert('文件大小不能超过 50MB');
                    return;
                }

                this.fileName.textContent = file.name;
                
                const arrayBuffer = await file.arrayBuffer();
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.audioBuffer = await this.audioContext.decodeAudioData(arrayBuffer);
                
                this.duration = this.audioBuffer.duration;
                this.startTime = 0;
                this.endTime = this.duration;
                
                this.startSlider.value = 0;
                this.endSlider.value = 100;
                
                this.updateUI();
                this.drawWaveform();
                
                this.editorPanel.classList.add('active');
                this.uploadZone.style.display = 'none';
            }

            updateUI() {
                this.fileMeta.textContent = `${this.formatTime(this.startTime)} / ${this.formatTime(this.duration)}`;
                this.startTimeEl.textContent = this.formatTime(this.startTime);
                this.endTimeEl.textContent = this.formatTime(this.endTime);
                this.durationEl.textContent = this.formatTime(this.endTime - this.startTime);
                
                const startPercent = (this.startTime / this.duration) * 100;
                const endPercent = (this.endTime / this.duration) * 100;
                
                this.startSliderVal.textContent = `${Math.round(startPercent)}%`;
                this.endSliderVal.textContent = `${Math.round(endPercent)}%`;
                
                this.selectionOverlay.style.left = `${startPercent}%`;
                this.selectionOverlay.style.width = `${endPercent - startPercent}%`;
            }

            updateSelection() {
                let startVal = parseInt(this.startSlider.value);
                let endVal = parseInt(this.endSlider.value);
                
                if (startVal >= endVal - 1) {
                    startVal = endVal - 1;
                    this.startSlider.value = startVal;
                }
                
                this.startTime = (startVal / 100) * this.duration;
                this.endTime = (endVal / 100) * this.duration;
                
                this.updateUI();
            }

            drawWaveform() {
                const canvas = this.waveformCanvas;
                const ctx = canvas.getContext('2d');
                const width = canvas.width = canvas.offsetWidth * 2;
                const height = canvas.height = canvas.offsetHeight * 2;
                
                ctx.scale(2, 2);
                const displayWidth = width / 2;
                const displayHeight = height / 2;
                
                const data = this.audioBuffer.getChannelData(0);
                const step = Math.ceil(data.length / displayWidth);
                const amp = displayHeight / 2;
                
                ctx.fillStyle = '#1c1c1f';
                ctx.fillRect(0, 0, displayWidth, displayHeight);
                
                ctx.strokeStyle = '#ff6b35';
                ctx.lineWidth = 1;
                ctx.beginPath();
                
                for (let i = 0; i < displayWidth; i++) {
                    let min = 1.0;
                    let max = -1.0;
                    
                    for (let j = 0; j < step; j++) {
                        const datum = data[(i * step) + j];
                        if (datum < min) min = datum;
                        if (datum > max) max = datum;
                    }
                    
                    const y1 = (1 + min) * amp;
                    const y2 = (1 + max) * amp;
                    
                    ctx.moveTo(i, y1);
                    ctx.lineTo(i, y2);
                }
                
                ctx.stroke();
                
                ctx.strokeStyle = 'rgba(255, 107, 53, 0.5)';
                ctx.beginPath();
                ctx.moveTo(0, displayHeight / 2);
                ctx.lineTo(displayWidth, displayHeight / 2);
                ctx.stroke();
            }

            play() {
                if (this.isPlaying) {
                    this.stop();
                }
                
                this.sourceNode = this.audioContext.createBufferSource();
                this.sourceNode.buffer = this.audioBuffer;
                this.sourceNode.connect(this.audioContext.destination);
                
                this.sourceNode.start(0, this.startTime, this.endTime - this.startTime);
                this.playStartOffset = this.startTime;
                this.isPlaying = true;
                
                this.playBtn.innerHTML = `
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                    播放中...
                `;
                
                this.sourceNode.onended = () => {
                    this.isPlaying = false;
                    this.playBtn.innerHTML = `
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z"/>
                        </svg>
                        预览
                    `;
                };
            }

            stop() {
                if (this.sourceNode && this.isPlaying) {
                    this.sourceNode.stop();
                    this.sourceNode.disconnect();
                    this.isPlaying = false;
                }
                
                this.playBtn.innerHTML = `
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                    预览
                `;
            }

            async export() {
                this.stop();
                
                this.progressBar.classList.add('active');
                this.progressFill.style.width = '0%';
                this.exportBtn.disabled = true;
                
                await new Promise(r => setTimeout(r, 100));
                this.progressFill.style.width = '30%';
                
                const sampleRate = this.audioBuffer.sampleRate;
                const startSample = Math.floor(this.startTime * sampleRate);
                const endSample = Math.floor(this.endTime * sampleRate);
                const length = endSample - startSample;
                
                const trimmedBuffer = this.audioContext.createBuffer(
                    this.audioBuffer.numberOfChannels,
                    length,
                    sampleRate
                );
                
                for (let channel = 0; channel < this.audioBuffer.numberOfChannels; channel++) {
                    const sourceData = this.audioBuffer.getChannelData(channel);
                    const trimmedData = trimmedBuffer.getChannelData(channel);
                    
                    for (let i = 0; i < length; i++) {
                        trimmedData[i] = sourceData[startSample + i];
                    }
                }
                
                this.progressFill.style.width = '60%';
                
                const wavBlob = this.bufferToWav(trimmedBuffer);
                
                this.progressFill.style.width = '90%';
                
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.href = url;
                const originalName = this.fileName.textContent.replace('.mp3', '');
                a.download = `${originalName}_trimmed.wav`;
                a.click();
                URL.revokeObjectURL(url);
                
                this.progressFill.style.width = '100%';
                
                setTimeout(() => {
                    this.progressBar.classList.remove('active');
                    this.exportBtn.disabled = false;
                }, 500);
            }

            bufferToWav(buffer) {
                const numChannels = buffer.numberOfChannels;
                const sampleRate = buffer.sampleRate;
                const format = 1;
                const bitDepth = 16;
                
                const length = buffer.length;
                const dataLength = length * numChannels * (bitDepth / 8);
                const bufferLength = 44 + dataLength;
                
                const arrayBuffer = new ArrayBuffer(bufferLength);
                const view = new DataView(arrayBuffer);
                
                const writeString = (offset, string) => {
                    for (let i = 0; i < string.length; i++) {
                        view.setUint8(offset + i, string.charCodeAt(i));
                    }
                };
                
                writeString(0, 'RIFF');
                view.setUint32(4, bufferLength - 8, true);
                writeString(8, 'WAVE');
                writeString(12, 'fmt ');
                view.setUint32(16, 16, true);
                view.setUint16(20, format, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
                view.setUint16(32, numChannels * (bitDepth / 8), true);
                view.setUint16(34, bitDepth, true);
                writeString(36, 'data');
                view.setUint32(40, dataLength, true);
                
                let offset = 44;
                for (let i = 0; i < length; i++) {
                    for (let channel = 0; channel < numChannels; channel++) {
                        const sample = Math.max(-1, Math.min(1, buffer.getChannelData(channel)[i]));
                        const intSample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
                        view.setInt16(offset, intSample, true);
                        offset += 2;
                    }
                }
                
                return new Blob([arrayBuffer], { type: 'audio/wav' });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new AudioTrimmer();
        });
    </script>
</body>
</html>
